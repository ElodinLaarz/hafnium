repos:
  - repo: https://github.com/Scony/godot-gdscript-toolkit
    rev: 4.5.0
    hooks:
      - id: gdformat
      - id: gdlint
  - repo: local
    hooks:
      - id: gdscript-type-hints
        name: gdscript-type-hints
        entry: python .githooks/check_gdscript_type_hints.py
        language: system
        files: ^Hafnium/(scripts|tests)/.*\.gd$
